version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null
      - name: city
        tests:
          - not_null
      - name: state
        tests:
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_sellers
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: fct_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_id
      - name: customer_unique_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_unique_id
      - name: status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [delivered, shipped, canceled, invoiced, processing, created, approved, unavailable]
      - name: price
        tests:
          - not_null
      - name: freight
        tests:
          - not_null
      - name: item_total
        tests:
          - not_null
      - name: payment_type
        tests:
          - accepted_values:
              arguments:
                values: [credit_card, boleto, voucher, debit_card]
